# =============================================
# Production Profile (active when SPRING_PROFILES_ACTIVE=prod)
# =============================================

# --- PostgreSQL (Neon) Database ---
# Set DATABASE_URL as an env variable in Render, e.g.:
# postgresql://user:password@ep-xxx.us-east-2.aws.neon.tech/neondb?sslmode=require
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.jakarta.persistence.jdbc.url=jdbc:${DATABASE_URL}

# --- Connection Pooling (prevent OOM) ---
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=2000
# Disable Open-In-View (saves memory per request)
spring.jpa.open-in-view=false

# --- Logging (Debug) ---
logging.level.org.hibernate=DEBUG
logging.level.org.springframework=INFO
logging.level.com.zaxxer.hikari=DEBUG


# --- GenAI ---
genai.huggingface.api-key=${GENAI_HF_API_KEY:}
genai.huggingface.model=mistralai/Mistral-7B-Instruct

# --- Server ---
server.port=${PORT:8080}
